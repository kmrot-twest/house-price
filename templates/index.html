<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .checkbox {
            margin: 10px 0;
            text-align: left;
            padding-left: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: #222;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>House Price Predictor</h2>

    <form action="/predict" method="post">

        <input type="text" name="f1" placeholder="Square Feet" required>
        <input type="text" name="f2" placeholder="Bedrooms" required>
        <input type="text" name="f3" placeholder="Bathrooms" required>
        <input type="text" name="f4" placeholder="Offers" required>

        <!-- Checkbox for brick -->
        <div class="checkbox">
            <label>
                <input type="checkbox" name="f5" value="1">
                Is made of brick
            </label>
        </div>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {% if prediction %}
            <h3>Predicted Price: {{ prediction }}</h3>
        {% endif %}
    </div>
</div>

</body>
</html>
